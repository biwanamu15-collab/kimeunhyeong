<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<title>It's time to go to Bed</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    font-family: 'EB Garamond', Georgia, serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Nav ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 40px 14px;
    flex-shrink: 0;
  }
  nav a {
    font-size: 22px;
    color: #000;
    text-decoration: none;
    letter-spacing: -0.01em;
  }
  nav h1 {
    font-size: 36px;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: #000;
    white-space: nowrap;
  }
  nav h1 span {
    font-size: 48px;
    font-weight: 400;
  }
  .nav-divider {
    border: none;
    border-top: 1px solid #000;
    flex-shrink: 0;
  }

  /* ── Camera area ── */
  #camera-wrap {
    flex: 1;
    margin: 20px 40px 30px;
    position: relative;
    background: #000;
    overflow: hidden;
  }

  #video {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0.7;
  }

  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    transform: scaleX(-1);
  }

  #status {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>

<nav>
  <a href="#">About</a>
  <h1>It's time to go to <span>Bed</span></h1>
  <a href="#">Home</a>
</nav>
<hr class="nav-divider">

<div id="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="status">Point your index finger ↑ to write · Open palm to erase</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
const WORDS = ["I", "want", "to", "go", "to", "Bed."];
const FONT_SIZE = 38;
// Minimum distance finger must travel before next word appears
const WORD_SPACING = 90; // px

const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const wrap   = document.getElementById('camera-wrap');

let W, H;
function resize() {
  W = canvas.width  = wrap.clientWidth;
  H = canvas.height = wrap.clientHeight;
}
resize();
window.addEventListener('resize', resize);

// ── State ──────────────────────────────────────────────
let wordIndex    = 0;      // which word comes next
let stampedWords = [];     // [{word, x, y, angle, alpha, born}]
let fingerPos    = null;   // current {x,y}
let prevStampPos = null;   // position where last word was stamped
let prevPos      = null;   // for angle calculation
let handActive   = false;

function distBetween(a, b) {
  return Math.hypot(b.x - a.x, b.y - a.y);
}

// Stamp the current word at finger position, compute angle from movement
function stampWord(x, y, angle) {
  const word = WORDS[wordIndex % WORDS.length];
  stampedWords.push({ word, x, y, angle, alpha: 0 });
  wordIndex++;
  prevStampPos = { x, y };
}

// ── Render loop ────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);

  // Erase flash feedback
  if (eraseFlash > 0) {
    ctx.save();
    ctx.globalAlpha = eraseFlash * 0.25;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
    eraseFlash = Math.max(0, eraseFlash - 0.06);
  }

  // Finger dot
  if (fingerPos && handActive) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(fingerPos.x, fingerPos.y, 9, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(220, 200, 255, 0.85)';
    ctx.shadowColor = 'rgba(180, 140, 255, 0.9)';
    ctx.shadowBlur = 18;
    ctx.fill();
    ctx.restore();
  }

  // Words — permanent, no fade out
  for (const w of stampedWords) {
    // Fade in fast only
    if (w.alpha < 1) w.alpha = Math.min(1, w.alpha + 0.12);

    ctx.save();
    ctx.translate(w.x, w.y);
    ctx.scale(-1, 1); // undo canvas CSS mirror so text reads left-to-right
    ctx.rotate(-w.angle); // angle is also mirrored, so negate it
    ctx.font = `700 ${FONT_SIZE}px 'Inter', 'Arial Black', Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = w.alpha;
    ctx.shadowColor = 'rgba(200, 175, 255, 0.85)';
    ctx.shadowBlur = 14;
    ctx.fillStyle = '#ede8ff';
    ctx.fillText(w.word, 0, 0);
    ctx.restore();
  }

  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// ── Palm open detection ───────────────────────────────
// All 5 fingertips above their respective MCP joints = open palm
function isOpenPalm(lm) {
  const tips = [4, 8, 12, 16, 20];
  const mcps = [2, 5,  9, 13, 17];
  let openCount = 0;
  for (let i = 0; i < tips.length; i++) {
    if (lm[tips[i]].y < lm[mcps[i]].y - 0.02) openCount++;
  }
  return openCount >= 4;
}

let isErasing = false;
let eraseFlash = 0; // for visual feedback

// ── MediaPipe ─────────────────────────────────────────
const hands = new Hands({ locateFile: f =>
  `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.6
});

hands.onResults((results) => {
  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    handActive = false;
    isErasing = false;
    prevPos = null;
    prevStampPos = null;
    return;
  }

  const lm = results.multiHandLandmarks[0];

  // Canvas is CSS-mirrored (scaleX(-1)) to match video
  const fx = lm[8].x * W;
  const fy = lm[8].y * H;
  fingerPos = { x: fx, y: fy };
  handActive = true;

  // ── Open palm → erase all ──
  if (isOpenPalm(lm)) {
    if (!isErasing) {
      isErasing = true;
      stampedWords = [];
      wordIndex = 0;
      prevStampPos = null;
      prevPos = null;
      eraseFlash = 1.0;
    }
    return;
  }
  isErasing = false;

  // ── Index finger pointing up → stamp words ──
  const tipY = lm[8].y;
  const mcpY = lm[5].y;
  const isPointing = tipY < mcpY - 0.03;

  if (!isPointing) {
    prevPos = null;
    prevStampPos = null;
    return;
  }

  // Compute movement angle
  let angle = 0;
  if (prevPos) {
    const dx = fx - prevPos.x;
    const dy = fy - prevPos.y;
    if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
      angle = Math.atan2(dy, dx);
    }
  }

  // Stamp a word if finger moved far enough from last stamp
  const distFromLastStamp = prevStampPos
    ? distBetween({ x: fx, y: fy }, prevStampPos)
    : WORD_SPACING + 1;

  if (distFromLastStamp >= WORD_SPACING) {
    stampWord(fx, fy, angle);
  }

  prevPos = { x: fx, y: fy };
});

// ── Camera ────────────────────────────────────────────
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' }
    });
    video.srcObject = stream;
    statusEl.textContent = 'Point your index finger ↑ to write';

    const camera = new Camera(video, {
      onFrame: async () => { await hands.send({ image: video }); },
      width: 1280,
      height: 720
    });
    camera.start();
  } catch (e) {
    statusEl.textContent = 'Camera access denied';
  }
}

startCamera();
</script>
</body>
</html>
